# Monokai Pro Light theme for Helix
# Based on monokai_pro.toml by WindSoilder, adapted for light mode
# Accent colors derived from the official Monokai Pro Light palette: https://monokai.pro
#
# This file was generated by claude.

"ui.linenr.selected" = { bg = "base2" }
"ui.text.focus" = { fg = "yellow", modifiers = ["bold"] }
"ui.menu" = { fg = "base8", bg = "base2" }
"ui.menu.selected" = { fg = "base0", bg = "purple" }
"ui.virtual.whitespace" = "base4"
"ui.virtual.ruler" = { bg = "base1" }
"ui.virtual.jump-label" = { fg = "red", modifiers = ["bold"] }

"info" = "base5"
"hint" = "base5"

# background color
"ui.background" = { bg = "base0" }

# status bars, panels, modals, autocompletion
"ui.statusline" = { fg = "base8", bg = "base3" }
"ui.statusline.inactive" = { fg = "base5", bg = "base1" }
"ui.statusline.normal" = { fg = "base0", bg = "blue" }
"ui.statusline.insert" = { fg = "base0", bg = "green" }
"ui.statusline.select" = { fg = "base0", bg = "purple" }
"ui.popup" = { bg = "base2" }
"ui.window" = { bg = "base2" }
"ui.help" = { fg = "base8", bg = "base2" }

# active line, highlighting
"ui.selection" = { bg = "base3" }
"ui.cursor.match" = { bg = "base3" }
"ui.cursorline" = { bg = "base1" }

# bufferline, inlay hints
"ui.bufferline" = { fg = "base5", bg = "base1" }
"ui.bufferline.active" = { fg = "base8", bg = "base0" }
"ui.virtual.inlay-hint" = { fg = "base4" }

# comments, line numbers
"comment" = { fg = "base4", modifiers = ["italic"] }
"ui.linenr" = { fg = "base4" }

# cursor, variables, constants, attributes, fields
"ui.cursor.primary" = { fg = "base8", modifiers = ["reversed"] }
"attribute" = "blue"
"variable" = "base8"
"constant" = "orange"
"variable.builtin" = "red"
"constant.builtin" = "red"
"namespace" = "base8"

# base text, punctuation
"ui.text" = { fg = "base8" }
"punctuation" = "base6"

# classes, types, primitives
"type" = "green"
"type.builtin" = { fg = "red" }
"label" = "base8"

# declaration, methods, routines
"constructor" = "blue"
"function" = "green"
"function.macro" = { fg = "blue" }
"function.builtin" = { fg = "blue" }

# operator, tags, units, punctuations
"operator" = "red"
"variable.other.member" = "base8"

# keywords, special
"keyword" = { fg = "red" }
"keyword.directive" = "blue"
"variable.parameter" = "#e16032"

# error
"error" = "red"

# annotations, decorators
"special" = "#e16032"
"module" = "#e16032"

# warnings, escape characters, regex
"warning" = "orange"
"constant.character.escape" = { fg = "base8" }

# strings
"string" = "yellow"

# integer, floating point
"constant.numeric" = "purple"

# vcs
"diff.plus" = "green"
"diff.delta" = "orange"
"diff.minus" = "red"

# make diagnostic underlined, to distinguish with selection text.
"diagnostic.warning" = { underline = { color = "orange", style = "curl" } }
"diagnostic.error" = { underline = { color = "red", style = "curl" } }
"diagnostic.info" = { underline = { color = "base5", style = "curl" } }
"diagnostic.hint" = { underline = { color = "base5", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# markup highlight
"markup.heading" = "green"
"markup.bold" = { fg = "orange", modifiers = ["bold"] }
"markup.italic" = { fg = "orange", modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "orange", modifiers = ["underlined"] }
"markup.link.text" = "yellow"
"markup.quote" = "green"

[palette]
# primary accent colors (from official Monokai Pro Light palette)
"red" = "#e14775"
"orange" = "#e16032"
"yellow" = "#cc7a0a"
"green" = "#269d69"
"blue" = "#1c8ca8"
"purple" = "#7058be"
# base colors, from lightest (background) to darkest (foreground)
"base0" = "#faf4f2"
"base1" = "#f0eaeb"
"base2" = "#e8e3e4"
"base3" = "#bfb9ba"
"base4" = "#a59fa0"
"base5" = "#706b6e"
"base6" = "#5e585f"
"base7" = "#403c41"
"base8" = "#29242a"
